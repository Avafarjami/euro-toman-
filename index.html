<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            align-items: center; justify-content: center; z-index: 10;
            font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">در حال محاسبه پشته اسکناس...</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./euro.mind; filterMinCF:0.001; filterBeta:0.01;" 
        embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="note-texture" src="./p.toman" />
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="money-stack">
            </a-entity>
    </a-scene>

    <script>
        async function buildStack() {
            try {
                const response = await fetch("https://open.er-api.com/v6/latest/EUR");
                const data = await response.json();
                const eurToIrr = data.rates.IRR;
                
                // محاسبه تعداد اسکناس‌های 10,000 ریالی
                const count = Math.floor(eurToIrr / 10000);
                const container = document.querySelector('#money-stack');
                
                for (let i = 0; i < count; i++) {
                    const plane = document.createElement('a-plane');
                    plane.setAttribute('src', '#note-texture');
                    plane.setAttribute('width', '1');
                    plane.setAttribute('height', '0.5');
                    plane.setAttribute('transparent', 'true');
                    
                    const yPos = i * 0.006; 
                    const randomRot = (Math.random() - 0.5) * 6; 
                    
                    plane.setAttribute('position', `0 ${yPos} 0`);
                    plane.setAttribute('rotation', `-90 0 ${randomRot}`);
                    
                    container.appendChild(plane);
                }
                
                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) {
                document.getElementById('loading-overlay').innerText = "خطا در دریافت قیمت";
            }
        }
        window.onload = buildStack;
    </script>
</body>
</html>
