<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene 
        mindar-image="imageTargetSrc: ./euro.mind; filterMinCF:0.001; filterBeta:0.01;" 
        embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="note-texture" src="./10k.png" />
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="money-stack">
            </a-entity>
    </a-scene>

    <script>
        async function buildStack() {
            try {
                // دریافت قیمت یورو به ریال
                const response = await fetch("https://open.er-api.com/v6/latest/EUR");
                const data = await response.json();
                const eurToIrr = data.rates.IRR;
                
                // محاسبه تعداد اسکناس‌های 10,000 ریالی
                const count = Math.floor(eurToIrr / 10000);
                
                const container = document.querySelector('#money-stack');
                
                // ساختن دسته‌ای از اسکناس‌ها
                for (let i = 0; i < count; i++) {
                    const plane = document.createElement('a-plane');
                    plane.setAttribute('src', '#note-texture');
                    plane.setAttribute('width', '1');
                    plane.setAttribute('height', '0.5');
                    plane.setAttribute('transparent', 'true');
                    
                    // ایجاد افکت پشته‌سازی (روی هم چیدن)
                    // هر اسکناس کمی بالاتر از قبلی و با کمی چرخش تصادفی برای طبیعی شدن
                    const yPos = i * 0.005; // فاصله بسیار کم در ارتفاع
                    const rotation = (Math.random() - 0.5) * 5; // چرخش تصادفی بین -2.5 تا 2.5 درجه
                    
                    plane.setAttribute('position', `0 ${yPos} 0`);
                    plane.setAttribute('rotation', `0 0 ${rotation}`);
                    
                    container.appendChild(plane);
                }
                
                console.log(`تعداد ${count} اسکناس ایجاد شد.`);
            } catch (e) {
                console.error("خطا در دریافت قیمت یا ساخت پشته:", e);
            }
        }

        window.onload = buildStack;
    </script>
</body>
</html>
